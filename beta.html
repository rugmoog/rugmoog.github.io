    <script>
      async function loadPage(url){
        let response = await fetch("https://pugmoog.github.io/Bugmoog/game-page.html");
        let html = await response.text();

        document.open();
        document.write(html);
        document.close();

        let frame = document.getElementById("gameFrame");
        frame.src=url;
      }  
 

      document.querySelectorAll('button').forEach(button=>{
        if (!(button.id=== "run-code")) {
        button.onclick=function(){
          loadPage("https://pugmoog.github.io/games/"+this.dataset.url);
        };
        }
      });
      
      document.querySelectorAll('img').forEach(image=>{
        image.src = "https://pugmoog.github.io/Bugmoog/images/"+image.dataset.url;
      });
    </script>
